# VQ-VAE with larger codebook and deeper encoder.
# Usage: python src/train_vqvae.py --config config/vqvae_large_codebook.yaml

data:
  path: "shapegraphs.pkl"
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  num_workers: 0
  seed: 42

model:
  encoder:
    hidden_dim: 256
    embed_dim: 128
    num_layers: 4
    heads: 8
    dropout: 0.1

  quantizer:
    num_embeddings: 1024
    commitment_cost: 0.25
    use_ema: true
    ema_decay: 0.99
    codebook_restart_threshold: 1.0

  decoder:
    num_roles: 22
    hidden_dim: 256
    num_cross_attn_heads: 8

loss:
  lambda_node: 1.0
  lambda_edge: 2.0
  lambda_pos: 1.0
  lambda_flag: 1.0

training:
  batch_size: 128
  max_epochs: 300
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  lr_scheduler: "cosine"
  warmup_epochs: 10
  gradient_clip_val: 1.0

logging:
  project_name: "vqvae-shapegraph"
  run_name: "large-codebook-1024"
  log_every_n_steps: 50
  csv_dir: "logs/vqvae"

checkpointing:
  dir: "checkpoints/vqvae"
  save_top_k: 3
  save_every_n_epochs: 10
  monitor: "val/loss"
  mode: "min"
