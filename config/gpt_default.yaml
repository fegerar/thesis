# ShapegraphGPT Default Configuration
# Autoregressive next-token prediction on VQ-VAE tokenized match sequences.
# Usage: python src/train_gpt.py --config config/gpt_default.yaml

# --- Data ---
data:
  token_dir: "/content/drive/MyDrive/thesis/tokens"      # directory with *_tokens.pt from tokenizer
  train_ratio: 0.8
  val_ratio: 0.1
  num_workers: 4
  seed: 42

# --- Model ---
model:
  vocab_size: 257                  # 256 codebook entries + 1 GOAL token
  context_length: 512              # tokens of causal context
  embed_dim: 256
  num_heads: 8
  num_layers: 6
  dropout: 0.1

# --- Training ---
training:
  batch_size: 256
  max_epochs: 100
  learning_rate: 3.0e-4
  weight_decay: 1.0e-4
  lr_scheduler: "cosine"
  warmup_epochs: 5
  gradient_clip_val: 1.0
  limit_train_batches: 2000        # steps per "epoch" (validates & checkpoints every 2k steps)
  limit_val_batches: 200

# --- Logging ---
logging:
  project_name: "shapegraph-gpt"
  run_name: null
  log_every_n_steps: 50
  csv_dir: "logs/gpt"

# --- Checkpointing ---
checkpointing:
  dir: "checkpoints/gpt"
  save_top_k: 3
  save_every_n_epochs: 1
  monitor: "val/loss"
  mode: "min"
