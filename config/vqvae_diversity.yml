# VQ-VAE with Diversity Loss
# Forces token slots to encode different aspects of the game state.
# Usage: python src/train_vqvae.py --config config/vqvae_diversity.yml

# --- Data ---
data:
  path: "/content/drive/MyDrive/thesis/data"  # directory with DFL XML files
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  num_workers: 0
  seed: 42
  subsample: 25  # take every Nth frame (25 = 1 fps at 25 Hz tracking)

# --- Model ---
model:
  # Encoder
  encoder:
    hidden_dim: 256
    embed_dim: 128
    num_layers: 3
    heads: 4
    dropout: 0.1
    num_summary_tokens: 3

  # Vector Quantizer (shared codebook)
  quantizer:
    type: shared
    num_embeddings: 256
    commitment_cost: 0.25
    use_ema: true
    ema_decay: 0.99
    codebook_restart_threshold: 1.0

  # Decoder
  decoder:
    num_roles: 23           # 22 players + 1 ball
    hidden_dim: 256
    num_cross_attn_heads: 4
    num_self_attn_layers: 3

# --- Loss ---
loss:
  lambda_pos: 1.0
  lambda_team: 1.0
  lambda_ball: 0.1
  lambda_diversity: 0.5   # penalize cosine similarity between slot embeddings

# --- Training ---
training:
  batch_size: 256
  max_epochs: 200
  learning_rate: 3.0e-4
  weight_decay: 1.0e-5
  lr_scheduler: "cosine"
  warmup_epochs: 5
  gradient_clip_val: 1.0

# --- Logging ---
logging:
  project_name: "vqvae-shapegraph"
  run_name: "diversity-loss"
  log_every_n_steps: 50
  csv_dir: "logs/vqvae"

# --- Checkpointing ---
checkpointing:
  dir: "/content/drive/MyDrive/thesis/checkpoints/vqvae-diversity"
  save_top_k: 3
  save_every_n_epochs: 10
  monitor: "val/loss"
  mode: "min"
